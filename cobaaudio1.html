  <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian EPS-TOPIK - 30 Soal</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --light: #f4f7f6;
            --active-border: #8e44ad; /* Warna Ungu */
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #quiz-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        #main-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 800px) {
            #main-container { grid-template-columns: 1fr; }
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--light);
        }

        #timer { font-size: 1.5rem; font-weight: bold; color: var(--danger); }

        .question-text { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.6; }

        .options-container { display: grid; gap: 10px; }

        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.2s;
        }

        .option.selected { background-color: #e1f5fe; border-color: var(--accent); }
        .correct-ans { border-color: var(--accent) !important; background-color: #e1f5fe !important; font-weight: bold; }
        .wrong-ans { border-color: var(--danger) !important; background-color: #fdeaea !important; color: var(--danger); }

        /* Navigation Grid */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .nav-item {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        /* Border Ungu Tebal untuk nomor yang sedang dikerjakan */
        .nav-item.active { 
            border: 4px solid var(--active-border) !important; 
            transform: scale(1.05);
            z-index: 2;
        }

        .nav-item.filled { background-color: #d1d8e0; }
        
        /* Nav colors after submit */
        .nav-correct { background-color: var(--accent) !important; color: white; border-color: var(--accent); }
        .nav-wrong { background-color: var(--warning) !important; color: black; border-color: var(--warning); }

        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        
        button {
            padding: 12px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-prev { background: #95a5a6; color: white; }
        .btn-next { background: var(--accent); color: white; }
        .btn-submit { background: var(--success); color: white; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        button:disabled { opacity: 0.3; }

        u { text-underline-offset: 4px; text-decoration-thickness: 2px; }
    </style>
</head>
<body>

<div id="quiz-wrapper">
    <div class="card" style="text-align: center;">
        <div id="timer">60:00</div>
    </div>

    <div id="main-container">
        <div class="card">
            <div class="header">
                <span id="q-label" style="font-weight:bold; color:var(--primary);">Soal</span>
            </div>
<div id="q-text" class="question-text"></div>

<div id="audio-box" style="margin-bottom:15px;"></div>

<div id="options-box" class="options-container"></div>            
            <div class="controls">
                <button class="btn-prev" id="prev-btn" onclick="move(-1)">Sebelumnya</button>
                <button class="btn-next" id="next-btn" onclick="move(1)">Berikutnya</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; font-size: 1rem;">Navigasi Soal</h3>
            <div class="nav-grid" id="nav-grid"></div>
            <button class="btn-submit" id="submit-btn" onclick="finish()">SUBMIT</button>
            <div id="result-box" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
        </div>
    </div>
</div>

<script>
    const rawData = [
{ q: "한국에서는 직장 상사에게 ‘반장님’처럼 직책 다음에 ‘-님’을 붙여 부릅니다. 만약 ‘과장님’이 여러 명이라면 구분을 위해 ‘김 과장님’, ‘이민주 과장님’과 같이 이름이나 성을 붙여 부르면 됩니다. 동료나 후배를 부를 때는 이름 뒤에 ‘씨’를 붙여서 ‘진수 씨’, ‘유진 씨’처럼 부릅니다. 친한 동료일 경우 직장 밖에서 ‘형’, ‘누나’와 같은 가족 호칭을 써서 부르기도 합니다.", audio: "audio/soal1.mp3", a: ["상사를 부를 때는 이름 뒤에 '씨'를 붙여 부릅니다.", "동료나 후배에게는 직책에 '-님'을 붙여 부릅니다.", "친한 사이일 경우 가족 호칭을 사용하지 않습니다.", "같은 직책인 사람이 여러 명이면 직책 앞에 성을 붙여 부릅니다."], c: 3 },

{ q: "휴게실은 여러 사람이 함께 이용하는 공간이므로 이어폰을 끼지 않고 스마트폰으로 방송을 보면 안 됩니다. 그리고 사람이 없을 때는 전등과 냉·난방기를 꺼야 합니다. 기숙사에서도 지켜야 할 규칙이 있습니다. 늦은 시간에는 방에서 텔레비전을 볼 때 소리를 작게 하고 세탁실과 샤워실은 사용하지 않는 것이 좋습니다.", a: ["기숙사 방에서는 큰 소리로 텔레비전을 봐도 됩니다.", "기숙사에서는 늦은 시간에 세탁실을 사용해야 합니다.", "다른 사람을 위해 휴게실의 불은 항상 켜 두어야 합니다.", "휴게실에서 스마트폰을 사용할 때는 이어폰을 껴야 합니다."], c: 3 },

{ q: "회식은 보통 하루 업무가 끝난 저녁 시간에 진행됩니다. 회식 자리에서는 업무와 관련된 대화보다는 개인적인 이야기나 취미, 일상생활에 관한 대화를 나눕니다. 회식에서는 대개 식사와 함께 술이 제공되지만 술을 마시지 않는 경우에는 예의를 지켜 거절해도 됩니다. 요즘은 회식을 점심시간에 하기도 하며, 음주보다는 다양한 활동을 하는 것으로 변화하는 추세입니다.", a: ["회식에서 개인적인 이야기를 하면 안 됩니다.", "회식에서는 주로 업무와 관련된 대화를 나눕니다.", "회식에서 반드시 술을 마셔야 하는 것은 아닙니다.", "회식은 주로 점심시간에 하지만 요즘은 저녁에도 합니다."], c: 2 },

{ q: "직장 내 성희롱은 직장에서 발생하는 성적인 괴롭힘이나 성적인 강요를 말합니다. 이는 성적인 언어나 행동, 원치 않는 신체 접촉 등을 포함합니다. 성희롱은 피해자에게 심각한 정신적 고통을 줄 수 있으며, 직장 분위기를 나쁘게 만듭니다. 이를 예방하기 위해 회사는 성희롱 예방 교육을 실시하고 있습니다.", a: ["성희롱은 신체 접촉만 포함합니다.", "성희롱은 피해자에게 큰 정신적 고통을 줄 수 있다.", "성희롱 문제가 발생하면 성희롱 예방 교육을 합니다.", "직장 분위기가 나쁘면 성희롱이 발생할 수 있습니다."], c: 1 },

{ q: "한국의 산업 구조는 과거에는 농업과 경공업 중심이었지만 현재는 전자, 자동차, 조선 등에서 세계적인 경쟁력을 가지고 있습니다. 또한 IT와 소프트웨어 산업의 발전을 바탕으로 금융, 교육, 의료, 관광 등의 서비스 산업이 한국의 디지털 경제 발전을 이끌고 있습니다. 그리고 한국의 K-pop, 드라마, 영화 등의 세계적 인기에 힘입어 문화 콘텐츠 산업도 큰 주목을 받고 있습니다.", a: ["과거 한국의 산업 구조는 금융, 교육, 의료 중심이었습니다.", "한국의 금융, 교육, 의료 산업은 아직 발전하지 못하였습니다.", "한국의 농업과 경공업은 세계적인 경쟁력을 가지고 있습니다.", "한국의 K-pop과 드라마는 세계적으로 인기를 얻고 있습니다."], c: 3 },

{ q: "한국은 천연자원이 부족하고 내수 시장이 작아 정부에서 지속적으로 수출 주도 정책을 펴 왔습니다. 주요 수출 품목은 반도체, 스마트폰 등이고 원유, 천연가스 등을 주로 수입합니다. 한국의 무역 상대국 1위는 중국이며, 미국, 일본 등이 그 뒤를 잇고 있습니다. 한국은 다양한 국가와 자유무역협정을 체결하여 무역의 장벽을 줄이고, 새로운 시장으로 진출하고자 노력하고 있습니다.", a: ["한국은 주로 원유, 천연가스 등을 수출합니다.", "한국은 미국과 무역 거래를 가장 많이 합니다.", "한국은 무역 시장을 넓히기 위해 노력하고 있습니다.", "한국은 자유무역협정으로 인해 무역에 어려움이 있습니다."], c: 2 },

{ q: "한국의 가전제품은 최신 기능과 세련된 디자인으로 세계인들의 사랑을 받고 있습니다. 텔레비전, 냉장고, 세탁기, 에어컨 등과 같은 다양한 가전제품이 전 세계 가전제품 시장을 휩쓸고 있습니다. 2023년 미국 가전제품 시장에서 한국 상품의 시장 점유율이 40%를 차지할 정도로 인기가 많습니다.", a: ["한국의 가전제품은 세계 여러 나라에서 인기가 있습니다.", "한국의 기업은 아직 미국 시장으로는 진출하지 않았습니다.", "한국의 가전제품은 디자인보다는 기능에 집중하고 있습니다.", "한국의 기업들은 소형 가전제품 개발에 중점을 두고 있습니다."], c: 0 },

{ q: "한국의 자동차 산업은 한국 경제 성장을 이끄는 중요한 산업 중 하나입니다. 2023년 기준 한국의 자동차 시장 점유율은 일본, 유럽, 중국, 미국에 이어 세계 5위입니다. 한국의 자동차 회사들은 미래의 자동차 기술인 전기차, 수소차와 같은 친환경 자동차기술과 자율주행 기술 개발에 많은 투자를 하고 있습니다.", a: ["미국은 2023년에 세계에서 가장 많은 자동차를 생산했습니다.", "한국의 자동차 기업들은 수소차 개발에 투자를 하지 않습니다.", "한국의 자동차 기업들은 자율주행 기술 개발에 관심이 없습니다.", "2023년 한국의 자동차 시장 점유율은 세계에서 다섯 번째로 높습니다."], c: 3 },

{ q: "그라인더로 작업할 때는 큰 상해를 입을 수 있으므로 조심해야 합니다. 그라인더의 날을 교체할 때에는 반드시 전원을 꺼야 합니다. 그리고 바닥에 물체를 놓아두고 절단 작업을 할 때는 그라인더의 날이 안쪽(왼쪽)으로 향하게 잡아야 합니다. 또한 작업 전에는 보안경이나 방진마스크 등과 같은 보호구를 착용해야 합니다.", a: ["그라인더의 날은 전원을 켠 상태에서 교체합니다.", "그라인더로 작업할 때에는 보안경을 써야 합니다.", "그라인더로 작업할 때에 마스크는 쓰지 않아도 됩니다.", "물체를 바닥에 놓고 작업할 때에는 날이 밖으로 향해야 합니다."], c: 1 },

{ q: "세계 각국은 화석 연료의 사용으로 인한 환경 파괴와 기후 변화에 대응하기 위하여 친환경 에너지 개발에 힘쓰고 있습니다. 친환경 에너지는 초기 설치 비용이 높아 경제적으로 부담이 될 수 있지만, 운영 비용이 낮고 무제한으로 사용할 수 있다는 장점이 있습니다. 또한 화석 연료의 고갈을 막고 온실가스를 줄여 급격한 기후 변화에 따른 재난에 대비할 수 있게 해 줍니다.", a: ["세계 각국은 화석 연료 개발에 힘쓰고 있습니다.", "화석 연료 사용으로 기후 변화에 대비할 수 있습니다.", "친환경 에너지 사용으로 온실가스를 줄일 수 있습니다.", "친환경 에너지는 설치에 대한 경제적 부담이 적습니다."], c: 2 },

{ q: "한국의 섬유 산업과 방직 산업은 한국전쟁 이후 경제 재건을 위한 산업화 시기에 시작되었습니다. 그 후 지속적으로 성장하였으며, 2000년대에 이르러 한국의 섬유 산업에 첨단 기술이 도입되면서 기능성 섬유와 같은 고품질의 소재를 생산할 수 있게 되었습니다. 그 결과, 2022년 한국의 섬유 산업은 화학 섬유와 편직물을 중심으로 세계 시장 점유율 6위를 차지하게 되었습니다.", a: ["한국의 섬유 산업은 한국의 산업화 시기에 시작됐습니다.", "한국은 기능성 섬유 생산에 필요한 기술을 도입할 예정입니다.", "한국의 섬유 산업은 2000년대 이전까지 어려움을 겪었습니다.", "한국의 화학 섬유와 편직물은 세계 시장 진출을 앞두고 있습니다."], c: 0 },

{ q: "빌트인 가구는 특정 공간에 맞추어 제작된 가구로 옷장과 수납장, 책장 등이 있습니다. 공간을 효율적으로 활용할 수는 있지만 설치와 철거 비용이 많이 들고 교체가 어렵다는 단점이 있습니다. 이러한 단점에도 불구하고 최근에는 인기가 많아져서 가전제품도 빌트인으로 제작되고 있습니다.", a: ["빌트인 가구는 설치하기가 쉽습니다.", "빌트인 가구는 쉽게 교체할 수 있습니다.", "빌트인 가구는 요즘 별로 인기가 없습니다.", "빌트인 가구는 공간을 효율적으로 사용하게 해 줍니다."], c: 3 },

{ q: "교량이나 도로, 큰 건물을 짓는 대규모의 공사 현장에서는 다양한 중장비가 사용됩니다. 건설 중장비는 사용 목적에 따라 분류됩니다. 크게 토목 장비, 운반 장비, 포장 장비로 나누는데 무엇보다 안전하게 사용하는 것이 중요합니다.", a: ["큰 공사 현장에서는 다양한 중장비를 사용합니다.", "건설 중장비는 크게 두 종류로 분류할 수 있습니다.", "공사 규모에 따라 건설 중장비를 분류할 수 있습니다.", "건설 중장비는 고장 없이 사용하는 것이 가장 중요합니다."], c: 0 },

{ q: "한국은 우수한 기술력을 바탕으로 국내외의 다양한 대규모 토목 공사를 수행해 오고 있습니다. 대표적인 예로 인천 앞바다에 있던 몇 개의 섬을 간척하여 건설한 ‘인천국제공항’을 들 수 있습니다. 그리고 한국에서 가장 거대한 사장교인 왕복 6차로의 ‘인천대교’와 총 길이 8.2km의 세계에서 가장 긴 해상 다리 중 하나인 ‘거가대교’가 있습니다. ‘사막의 녹색혁명’이라 불리는 리비아의 대수로 공사도 한국의 기술력을 잘 보여 주는 예입니다.", a: ["거가대교는 왕복 6차로의 사장교입니다.", "인천국제공항은 사막 위에 세워졌습니다.", "인천대교는 세계에서 가장 긴 해상 다리입니다.", "리비아의 대수로 건설은 한국의 기술로 이루어졌습니다."], c: 3 },

{ q: "스마트팜은 생산성을 향상시키기 위하여 정보통신기술을 활용하는 농업 방식입니다. 빅데이터와 인공지능 기술을 활용하여 농작물의 성장 조건을 최적화하기 때문에 노동력을 줄이는 데도 도움을 줍니다. 한국에서는 스마트팜을 활용하여 과일, 쌈채소뿐만 아니라 허브류 재배도 하고 있습니다. 그리고 정부에서는 스마트팜 보급과 발전을 위해 다양한 정책으로 지원하고 있습니다.", a: ["스마트팜은 정부의 지원 없이 운영되고 있습니다.", "스마트팜 방식을 이용하면 사람이 해야 할 일이 많아집니다.", "한국에서는 스마트팜 방식으로 쌈채소를 재배하지 않습니다.", "스마트팜은 농작물의 성장을 위해 인공지능 기술을 활용합니다."], c: 3 },

{ q: "한국인은 다양한 육류를 즐기며 돼지고기, 닭고기, 소고기 순으로 육류를 소비합니다. 한국인의 육류 소비량은 예전에 비해 크게 늘었습니다. 2023년에 처음으로 1인당 60kg을 넘어섰는데, 이는 1인당 쌀 소비량인 56.4kg보다 많습니다. 그러나 최근에는 건강과 환경 문제에 대한 관심이 증가하면서 채식을 하거나 육류 소비를 줄이는 사람들이 늘고 있습니다.", a: ["채식을 하는 한국인이 줄고 있습니다.", "한국인은 소고기를 가장 많이 먹습니다.", "한국인은 예전보다 고기를 많이 먹습니다.", "한국인의 1인당 쌀 소비량은 육류 소비량보다 많습니다."], c: 2 },

{ q: "양식업은 조개, 해조류, 어류 등을 기르는 산업을 말합니다. 한국에서는 굴, 새우, 조개 등 다양한 수산물이 양식되고 있는데, 고부가가치의 수산물로 범위가 확대되고 있습니다. 한국의 양식업은 생산량을 기준으로 이미 어업의 생산량을 넘어섰으며, 다양한 기술을 도입하여 양식의 효율성을 높이고 있습니다.", a: ["한국에서는 조개를 양식하지 않습니다.", "한국은 양식업보다 어업의 생산량이 많습니다.", "한국에서 양식되는 수산물은 해조류에 한정됩니다.", "한국은 효율적인 양식을 위해 다양한 기술을 도입하고 있습니다."], c: 3 },

{ q: "한국은 세계적으로 경쟁력 있는 조선업 국가로, 대형 선박 및 특수 선박 건조에서 높은 기술력을 갖추고 있습니다. 특히 가스운반선, 유조선, 컨테이너선 분야에서 강점을 보입니다. 최근 경기 침체로 어려움을 겪고 있지만, 기술 혁신과 구조 개선을 통해 경쟁력을 강화하고 있습니다.", a: ["한국의 조선업체들은 주로 소형 선박을 만듭니다.", "한국의 조선업은 유조선 분야에서는 기술력이 약합니다.", "한국의 조선업은 경기 침체에도 불구하고 큰 어려움 없이 성장하고 있습니다.", "한국은 세계적으로 특수 선박 건조 분야에서 높은 기술력을 보유하고 있습니다."], c: 3 },

{ q: "다음은 무엇에 대한 설명입니까?<p>롱노즈 플라이어를 사용하여 피복을 벗겨낸 두 개의 구리선을 트위스트 방식으로 묶습니다. 두 구리선은 간격이 생기지 않도록 촘촘하게 묶어야 하고, 다 묶은 뒤에 구리선의 끝부분은 롱노즈 플라이어를 사용하여 깔끔하게 고정시켜야 합니다.", a: ["전선 접속 방법", "전선 절단 방법", "전선 교체 방법", "전선 운반 방법"], c: 0 },

{ q: "한국은 과거에 산림 자원이 부족했으나, 정부의 산림 보호 정책 덕분에 지금은 울창한 숲을 갖추게 되었습니다. 숲은 목재와 임산물을 제공하고 다양한 동식물의 서식지가 되어 생물 다양성을 증가시킵니다. 또한, 이산화탄소를 흡수해 기후 변화에 대응하게 해 줍니다. 최근에는 휴양과 관광, 스포츠 공간으로도 활용되고 있습니다.", a: ["한국은 과거부터 산림 자원이 풍부했습니다.", "숲은 오래전부터 스포츠 공간으로 활용되어 왔습니다.", "정부는 산림 보호를 위해 특별한 정책을 시행했습니다.", "숲은 이산화탄소를 흡수하여 생물 다양성을 감소시킵니다."], c: 2 },

{ q: "한국의 대도시는 도시마다 다른 특색을 지니고 있습니다. 서울은 한국의 과거와 현대가 공존하는 곳이며 밤늦게까지 쇼핑을 즐길 수 있어 여행객이 가장 많이 찾는 도시입니다. 부산은 바다가 아름답고 맛집들이 많아 인기가 많습니다. 그리고 근대사의 흔적이 남아 있는 대구는 골목길을 따라 걷는 근대골목 투어가 관광객들의 발길을 끌고 있습니다.", a: ["한국의 대도시는 보통 분위기가 비슷합니다.", "서울에서는 근대골목투어를 즐길 수 있습니다.", "부산은 바다가 아름다워 여행객이 좋아합니다.", "맛집 여행을 하고 싶을 때는 대구에 가면 됩니다."], c: 2 },

{ q: "한국의 라면, 김 등의 수출이 증가하면서 K-푸드 산업이 큰 주목을 받고 있습니다. 이 중 라면은 현지인의 입맛에 맞게 맛과 종류를 변화시켜 2024년 수출액이 처음으로 10억 달러를 돌파했습니다. 특히 ‘짜파구리’는 영화에 나온 후 인기를 얻으면서 상품으로 출시되었고, ‘불닭’ 라면 시리즈는 SNS의 ‘불닭 챌린지’의 확산에 힘입어 해외 시장에서 더 많이 팔리고 있습니다.", a: ["‘불닭 챌린지’를 했지만 ‘불닭’ 라면은 잘 팔리지 않습니다.", "‘짜파구리’는 영화에 나오기 전부터 한국에서 판매되었습니다.", "해외에서 먹는 라면의 맛과 한국에서 먹는 라면의 맛은 같습니다.", "라면의 수출액은 2024년 전까지 10억 달러를 넘기지 못했습니다."], c: 3 },

{ q: "다음은 무엇에 대한 설명입니까?<p>위험한 것을 조심할 수 있도록 미리 주의를 주기 위하여 만든 표지입니다.", a: ["안내 표지", "경고 표지", "지시 표지", "금지 표지"], c: 1 },

{ q: "비상구는 갑작스러운 사고가 생겼을 때 빨리 밖으로 나갈 수 있도록 만들어 놓은 출입구입니다. 비상구를 나타내는 표지판은 녹색입니다. 만약 건물에 화재가 발생하면 엘리베이터를 타지 말고 비상구를 통해 밖으로 나가야 합니다. 평소에 비상구가 어디에 있는지 알아 두면 긴급 상황에서 시간을 절약할 수 있습니다.", a: ["화재가 발생하면 엘리베이터로 이동해야 합니다.", "비상구를 나타내는 표지판의 색깔은 다양합니다.", "비상구는 사람들이 건물로 들어가는 출입구입니다.", "비상구의 위치를 알아 두면 빨리 나갈 수 있습니다."], c: 3 },

{ q: "작업 현장에서 안전 장비를 착용하는 것은 작업자의 생명과 건강을 지키기 위해 반드시 필요합니다. 소음이 심한 환경에서는 귀마개나 귀덮개를 사용하여 청력을 보호해야 합니다. 또한 화학 물질이나 먼지가 많은 환경에서는 방독 마스크나 송기 마스크를 반드시 착용해야 하며, 고온에서 작업할 때는 방열 보호구를 착용해야 합니다.", a: ["방열 보호구는 고온으로부터 작업자를 보호합니다.", "소음이 심한 작업장에서는 방독 마스크를 써야 합니다.", "작업장에 화학 물질이 있으면 귀덮개를 착용해야 합니다.", "작업 현장에서 안전 장비를 착용하는 것은 선택 사항입니다."], c: 0 },

{ q: "다음은 무엇에 대한 설명입니까?<p>불을 끌 때 사용하는 기구로 쉽게 불을 끌 수 있는 화학물질이 채워져 있습니다.", a: ["소화기", "방화문", "소방 호스 릴", "화재 경보기"], c: 0 },

{ q: "고용허가제는 고용노동부가 한국 내의 인력 부족 문제를 해결하고 외국인 노동자를 합법적으로 고용하기 위해 마련한 제도입니다. 자국에서 선발 시험을 통과한 지원자들은 사업주와 계약 후 한국 비자를 받을 수 있습니다. 한국에 온 후에는 한국인 노동자들과 동등하게 노동법이 정한 기본적인 권리를 보장 받으며 일할 수 있습니다.", a: ["지원자들은 한국에 입국한 후 사업주와 고용 계약을 합니다.", "고용허가제는 한국에 살고 있는 외국인을 위한 취업 제도입니다.", "지원자들은 시험에 통과해야 한국에서 일할 기회를 얻을 수 있습니다.", "고용허가제로 한국에 온 외국인은 한국인들과 다른 노동법의 보호를 받습니다."], c: 2 },

{ q: "표준근로계약서의 근로 시간은 1일 평균 근로 시간과 평균 시간 외 근로 시간으로 나누어 표시합니다. 그러나 농업, 축산업, 어업 분야의 경우에는 월 근로 시간으로 표시할 수 있습니다. 임금은 월 통상 임금을 적되 기본급, 고정적 수당, 상여금의 세부 내역을 포함해야 합니다. 임금 지급일을 적어야 하고, 임금을 직접 지급할지 통장으로 입금할지도 적어야 합니다.", a: ["1일 평균 근로 시간을 적지 않습니다.", "임금의 지급 방법은 포함되지 않습니다.", "업종과 상관없이 월 평균 근로 시간을 적습니다.", "기본급, 수당, 상여금의 세부 금액이 명시되어 있습니다."], c: 3 },

{ q: "대한민국에서 90일을 초과하여 체류하려고 하는 외국인은 외국인 등록을 해야 합니다. 외국인 등록을 하려면 먼저 필요한 서류를 준비해서 인터넷으로 출입국·외국인사무소 방문 예약을 신청합니다. 그리고 예약일에 출입국·외국인사무소에 방문해서 준비한 서류를 내면 외국인 등록증을 발급받을 수 있습니다.", a: ["인터넷으로 외국인 등록증을 발급받을 수 있습니다.", "외국인 등록에 필요한 서류는 인터넷으로 내면 됩니다.", "체류 기간이 90일이 넘지 않아도 외국인 등록을 해야 합니다.", "출입국·외국인사무소에 방문하기 전에 미리 예약해야 됩니다."], c: 3 },

{ q: "고용허가제로 입국하는 모든 외국인 근로자는 4대 사회보험과 외국인 근로자 전용 보험에 가입해야 합니다. 4대 사회보험 중 산재보험은 사업주만 가입하면 되지만 국민연금, 건강보험, 고용보험은 사업주와 근로자가 같이 가입해야 합니다. 그리고 외국인 근로자 전용 보험 중 귀국비용보험과 상해보험은 외국인 근로자만 가입할 수 있습니다.", a: ["산재보험은 근로자도 가입할 수 있습니다.", "사업주는 4대 사회보험 모두 가입해야 합니다.", "근로자는 외국인 근로자 전용 보험만 가입하면 됩니다.", "고용보험과 상해보험은 외국인 근로자 전용 보험입니다."], c: 1 }
];

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function init() {
        questions = rawData.map(item => {
    const options = item.a.map((txt, i) => ({
        text: txt,
        correct: i === item.c
    }));

    return {
        q: item.q,
        options: options
    };
});
        
        renderNav();
        renderQuestion();
        startTimer();
    }

    function renderNav() {
        const nav = document.getElementById('nav-grid');
        nav.innerHTML = '';
        questions.forEach((_, i) => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.innerText = i + 1;
            
            if (i === currentIdx) item.classList.add('active');
            if (userAnswers[i] !== null) item.classList.add('filled');
            
            if (isSubmitted) {
                const isCorrect = userAnswers[i] !== null && questions[i].options[userAnswers[i]].correct;
                item.classList.add(isCorrect ? 'nav-correct' : 'nav-wrong');
            }

            item.onclick = () => { currentIdx = i; renderQuestion(); renderNav(); };
            nav.appendChild(item);
        });
    }

function renderQuestion() {
    const q = questions[currentIdx];

    document.getElementById('q-label').innerText =
        `Soal Nomor ${currentIdx + 1}`;

    const isImage = q.q.includes('.jpg');

    if (isImage) {
        document.getElementById('q-text').innerHTML =
            `<img src="assets/img/${q.q}" style="max-width:100%; border-radius:10px;">`;
    } else {
        document.getElementById('q-text').innerHTML = q.q;
    }

    // AUDIO
    const audioBox = document.getElementById('audio-box');
    audioBox.innerHTML = '';

    if (rawData[currentIdx].audio) {

        const btn = document.createElement('button');

        btn.innerHTML = audioPlayed[currentIdx]
            ? '🔒 Audio Sudah Diputar'
            : '▶ Putar Audio';

        btn.style.background = '#3498db';
        btn.style.color = 'white';
        btn.style.marginBottom = '15px';

        btn.disabled = audioPlayed[currentIdx];

        btn.onclick = () => {

            if (audioPlayed[currentIdx]) return;

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            currentAudio = new Audio(rawData[currentIdx].audio);

            currentAudio.play();

            audioPlayed[currentIdx] = true;

            btn.disabled = true;
            btn.innerHTML = '🔒 Audio Sudah Diputar';
        };

        audioBox.appendChild(btn);
    }

    const box = document.getElementById('options-box');
    box.innerHTML = '';

    q.options.forEach((opt, i) => {

        const div = document.createElement('div');
        div.className = 'option';

        if (userAnswers[currentIdx] === i)
            div.classList.add('selected');

        if (isSubmitted) {

            if (opt.correct) {
                div.classList.add('correct-ans');
            } else if (userAnswers[currentIdx] === i) {
                div.classList.add('wrong-ans');
            }

        } else {

            div.onclick = () => {
                userAnswers[currentIdx] = i;
                renderQuestion();
                renderNav();
            };
        }

        const symbols = ['①', '②', '③', '④'];

        div.innerHTML = `${symbols[i]} ${opt.text}`;

        box.appendChild(div);
    });

    document.getElementById('prev-btn').disabled =
        currentIdx === 0;

    document.getElementById('next-btn').disabled =
        currentIdx === rawData.length - 1;
}

    function move(step) {
        currentIdx += step;
        renderQuestion();
        renderNav();
    }

    function startTimer() {
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            if (isSubmitted) { clearInterval(interval); return; }
            let m = Math.floor(timerValue / 60);
            let s = timerValue % 60;
            timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timerValue <= 0) { clearInterval(interval); finish(); }
            timerValue--;
        }, 1000);
    }

    function finish() {
        if (isSubmitted) return;
        if (timerValue > 0 && !confirm("Apakah Anda yakin ingin mensubmit semua jawaban?")) return;

        isSubmitted = true;
        let correctCount = 0;
        questions.forEach((q, idx) => {
            if (userAnswers[idx] !== null && q.options[userAnswers[idx]].correct) correctCount++;
        });

        const percent = ((correctCount / rawData.length) * 100).toFixed(1);
        
        document.getElementById('result-box').innerHTML = `
            <div style="color:var(--primary); font-size:1.2rem;">Skor Akhir:</div>
            <div style="font-size:2rem; color:var(--success);">${correctCount} / 30</div>
            <div style="font-size:1.5rem;">(${percent}%)</div>
        `;

        document.getElementById('submit-btn').disabled = true;
        renderQuestion();
        renderNav();
    }

    init();
</script>
</body>
</html>
